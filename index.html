<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劇本閱覽器</title>
    <style>
        /* 視覺設計：清爽白底 */
        body { background: #ffffff; color: #222; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* 左側書籤列：佔位小、不遮擋 */
        #sidebar { 
            width: 220px; background: #fcfcfc; border-right: 1px solid #eee; 
            overflow-y: auto; flex-shrink: 0; padding: 10px;
        }
        .file-link { 
            padding: 10px; cursor: pointer; border-radius: 4px; margin-bottom: 5px;
            font-size: 14px; border-bottom: 1px solid #f9f9f9;
        }
        .file-link:hover { background: #f0f7ff; color: #007bff; }
        .file-link.active { background: #007bff; color: #fff; font-weight: bold; }

        /* 右側主閱覽區 */
        #viewer { flex-grow: 1; overflow-y: auto; padding: 30px; line-height: 1.8; }
        .line { margin-bottom: 12px; border-bottom: 1px style solid #fafafa; }
        
        /* 上色邏輯 */
        .hl-en { color: #d35400; }    /* 英文：橘色 */
        .hl-num { color: #2ecc71; font-weight: bold; } /* 數字：綠色 */
        .hl-punc { color: #3498db; }  /* 半形標點：藍色 */

        @media (max-width: 600px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <strong style="display:block; padding:10px;">章節書籤</strong>
    <div id="file-list">載入清單中...</div>
</div>

<div id="viewer">
    <h2 id="title">請選擇檔案</h2>
    <div id="content"></div>
</div>

<script>
    // 自動上色函式
    function highlight(text) {
        if (!text) return "";
        return text
            .replace(/[a-zA-Z]+/g, '<span class="hl-en">$&</span>')
            .replace(/[0-9]+/g, '<span class="hl-num">$&</span>')
            .replace(/[\.,!?"':;\[\]\(\)\-\/]+/g, '<span class="hl-punc">$&</span>');
    }

    // 讀取並顯示檔案內容
    async function loadFile(fileName) {
        document.getElementById('title').innerText = fileName.replace(/\.[^/.]+$/, "");
        document.getElementById('content').innerHTML = "讀取中...";
        
        try {
            const res = await fetch(`data/${fileName}`);
            const text = await res.text();
            let html = "";

            if (fileName.endsWith('.json')) {
                const json = JSON.parse(text);
                // 假設你的 JSON 是 [{ "name": "...", "text": "..." }]
                json.forEach(line => {
                    html += `<div class="line"><strong>${line.name}:</strong> ${highlight(line.text)}</div>`;
                });
            } else {
                // 如果是純文字檔 (TXT)
                html = `<div style="white-space: pre-wrap;">${highlight(text)}</div>`;
            }
            document.getElementById('content').innerHTML = html;
        } catch (e) {
            document.getElementById('content').innerHTML = "讀取失敗，請檢查檔案是否存在於 data 資料夾中。";
        }
    }

    // 初始化：讀取目錄
    fetch('list.txt')
        .then(res => res.text())
        .then(data => {
            const files = data.split('\n').filter(name => name.trim() !== "");
            const listDiv = document.getElementById('file-list');
            listDiv.innerHTML = "";
            
            files.forEach(fileName => {
                const div = document.createElement('div');
                div.className = 'file-link';
                div.innerText = fileName.trim().replace(/\.[^/.]+$/, "");
                div.onclick = () => {
                    document.querySelectorAll('.file-link').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    loadFile(fileName.trim());
                };
                listDiv.appendChild(div);
            });
        });
</script>
</body>
</html>
